version: '3.8'

services:
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=5000
    depends_on:
      - db
    volumes:
      - ../server:/app
      - /app/node_modules
    command: npm run dev 

  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      # እዚህ ጋር localhost መጠቀሙ ለብሮውዘር ትክክል ነው
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ../client:/app
      - /app/node_modules
    command: npm run dev -- --host

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: resume_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: